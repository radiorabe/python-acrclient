name: Release

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [created]

permissions: {}

jobs:
  python-poetry:
    permissions:
      contents: write # for publishing gh-pages with mkdocs (unused)
    uses: radiorabe/actions/.github/workflows/release-python-poetry.yaml@b37e51397726092d8462a2a9b676ea5a5e3a8deb # v0.44.1
    with:
      deploy-mkdocs: false
    secrets:
      RABE_PYPI_TOKEN: ${{ secrets.RABE_PYPI_TOKEN }}
  release-docs:
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: radiorabe/actions/.github/workflows/release-zensical.yaml@b37e51397726092d8462a2a9b676ea5a5e3a8deb # v0.44.1
    with:
      requirements: mkdocstrings mkdocstrings-python
